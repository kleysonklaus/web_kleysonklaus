name: publish web

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ftp-deploy:
    name: FTP deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy website files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          local-dir: ./
          server-dir: public_html/
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/_workspace/**
            **/.venv/**
            **/node_modules/**
            .cpanel.yml
            README.md
